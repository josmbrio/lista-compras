<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Favicon -->
  <link rel="icon" href="favicon.ico">

  <!-- Apple -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- PWA Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lista de Compras</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css?v=2.5">
</head>
<body>

  <h1>🛒 Lista de Compras</h1>

  <!-- Agregar categoría -->
  <div class="controls">
    <input id="categoryInput" type="text" placeholder="Nueva categoría">
    <button onclick="addCategory()">Agregar</button>
  </div>

  <!-- Pegar productos -->
  <div class="controls">
    <textarea
      id="pasteInput"
      placeholder="Pega aquí productos (uno por línea)"
    ></textarea>

    <select id="categorySelect" onchange="onCategoryChange()"></select>

    <button onclick="addProducts()">Agregar</button>
  </div>

  <!-- Exportar / Importar -->
  <div class="controls">
    <button onclick="exportData()">📤 Exportar</button>
    <button onclick="exportSelected()">📤 Exportar Seleccionados</button>

    <button onclick="document.getElementById('importFile').click()">
      📥 Importar
    </button>

    <!-- INPUT OCULTO -->
    <input
      type="file"
      id="importFile"
      accept="application/json"
      style="display:none"
      onchange="importData(event)"
    >
  </div>

  <!-- Lista -->
  <div id="list"></div>

  <!-- Script -->
  <script src="app.js?v=2.5"></script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
